<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#111;
margin:0;
color:#fff;
}

/* wrapper */

.carousel-wrapper{
width:100%;
height:70vh;
perspective:1800px;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

/* cube */

.cube{
position:relative;
width:80vw;
height:70vh;
transform-style:preserve-3d;
transition:transform 1.6s ease-in-out;
}

/* faces */

.face{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.face img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(55%);
}

.face h1{
position:relative;
z-index:2;
font-size:4rem;
}

/* cube depth */

.front{ transform: rotateY(0deg) translateZ(40vw); }
.right{ transform: rotateY(90deg) translateZ(40vw); }
.back{ transform: rotateY(180deg) translateZ(40vw); }
.left{ transform: rotateY(-90deg) translateZ(40vw); }

/* mobile */

@media(max-width:768px){

.face h1{
font-size:2rem;
}

.front{ transform: rotateY(0deg) translateZ(50vw); }
.right{ transform: rotateY(90deg) translateZ(50vw); }
.back{ transform: rotateY(180deg) translateZ(50vw); }
.left{ transform: rotateY(-90deg) translateZ(50vw); }

}

</style>
</head>

<body>

<div class="carousel-wrapper">

<div class="cube" id="cube">

<div class="face front">
<img src="https://picsum.photos/1600/900?1">
<h1>Slide One</h1>
</div>

<div class="face right">
<img src="https://picsum.photos/1600/900?2">
<h1>Slide Two</h1>
</div>

<div class="face back">
<img src="https://picsum.photos/1600/900?3">
<h1>Slide Three</h1>
</div>

<div class="face left">
<img src="https://picsum.photos/1600/900?4">
<h1>Slide Four</h1>
</div>

</div>

</div>

<script>

let cube=document.getElementById("cube");
let angle=0;

setInterval(()=>{

angle-=90;
cube.style.transform=`rotateY(${angle}deg)`;

},3500);

</script>

</body>
</html>
