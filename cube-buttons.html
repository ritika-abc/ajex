<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#111;
margin:0;
color:#fff;
}

/* wrapper */

.carousel-wrapper{
width:100%;
height:70vh;
perspective:1800px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
}

/* cube */

.cube{
position:relative;
width:80vw;
height:70vh;
transform-style:preserve-3d;
transition:transform 1.4s ease;
}

/* faces */

.face{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
text-align:center;
}

.face img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(55%);
}

.face h1{
position:relative;
z-index:2;
font-size:4rem;
}

/* cube depth */

.front{ transform: rotateY(0deg) translateZ(40vw); }
.right{ transform: rotateY(90deg) translateZ(40vw); }
.back{ transform: rotateY(180deg) translateZ(40vw); }
.left{ transform: rotateY(-90deg) translateZ(40vw); }

/* buttons */

.nav-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
border:none;
color:#fff;
font-size:28px;
padding:10px 16px;
cursor:pointer;
z-index:5;
}

.prev{ left:20px; }
.next{ right:20px; }

/* dots */

.dots{
position:absolute;
bottom:25px;
display:flex;
gap:12px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
background:#777;
cursor:pointer;
}

.dot.active{
background:#fff;
}

/* mobile */

@media(max-width:768px){

.face h1{
font-size:2rem;
}

.cube{
width:90vw;
}

.front{ transform: rotateY(0deg) translateZ(45vw); }
.right{ transform: rotateY(90deg) translateZ(45vw); }
.back{ transform: rotateY(180deg) translateZ(45vw); }
.left{ transform: rotateY(-90deg) translateZ(45vw); }

}

</style>
</head>

<body>

<div class="carousel-wrapper">

<button class="nav-btn prev" id="prev">&#10094;</button>
<button class="nav-btn next" id="next">&#10095;</button>

<div class="cube" id="cube">

<div class="face front">
<img src="https://picsum.photos/1600/900?1">
<h1>Slide One</h1>
</div>

<div class="face right">
<img src="https://picsum.photos/1600/900?2">
<h1>Slide Two</h1>
</div>

<div class="face back">
<img src="https://picsum.photos/1600/900?3">
<h1>Slide Three</h1>
</div>

<div class="face left">
<img src="https://picsum.photos/1600/900?4">
<h1>Slide Four</h1>
</div>

</div>

<div class="dots" id="dots">
<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

</div>
<script>

let cube = document.getElementById("cube");
let dots = document.querySelectorAll(".dot");

let index = 0;
let angle = 0;
let total = dots.length;
let autoplay;

/* update carousel */

function updateCarousel(){

angle = index * -90;
cube.style.transform = `rotateY(${angle}deg)`;

dots.forEach(dot => dot.classList.remove("active"));
dots[index].classList.add("active");

}

/* next */

function nextSlide(){
index = (index + 1) % total;
updateCarousel();
}

/* prev */

function prevSlide(){
index = (index - 1 + total) % total;
updateCarousel();
}

/* buttons */

document.getElementById("next").onclick = ()=>{
nextSlide();
restartAutoplay();
};

document.getElementById("prev").onclick = ()=>{
prevSlide();
restartAutoplay();
};

/* dots */

dots.forEach((dot,i)=>{

dot.addEventListener("click",()=>{
index = i;
updateCarousel();
restartAutoplay();
});

});

/* autoplay */

function startAutoplay(){
autoplay = setInterval(nextSlide,4000);
}

function restartAutoplay(){
clearInterval(autoplay);
startAutoplay();
}

/* pause on hover */

document.querySelector(".carousel-wrapper").addEventListener("mouseenter",()=>{
clearInterval(autoplay);
});

document.querySelector(".carousel-wrapper").addEventListener("mouseleave",()=>{
startAutoplay();
});

/* start */

startAutoplay();

</script>

</body>
</html>
